name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

# Nur einen gleichzeitigen Build pro Branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────
  #  Tests auf Linux (schnell, kein Cross-Compile nötig)
  #  Läuft bei jedem Push — Gating-Job für die anderen
  # ──────────────────────────────────────────────────────────────
  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Dependencies
        run: sudo apt-get install -y cmake gcc

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SERVER=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

  # ──────────────────────────────────────────────────────────────
  #  Windows Build (nativer gci_server.exe mit ws2_32)
  #  Nur auf main/develop — DAS ist das eigentliche Ziel-Binary
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test-linux   # Erst testen, dann bauen

    steps:
      - uses: actions/checkout@v5

      - name: Configure (MSVC)
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SERVER=ON `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests on Windows
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload gci_server.exe
        uses: actions/upload-artifact@v4
        with:
          name: gci_server-windows-${{ github.sha }}
          path: |
            build/Release/gci_server.exe
            build/Export.lua
            build/gci_bridge.lua
            build/test_mission.lua
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  #  Release: Erstellt einen GitHub Release mit dem Windows-Binary
  #  Nur bei Tags wie v1.0.0
  # ──────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ test-linux, build-windows ]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      # Windows-Artifact aus dem build-windows Job holen
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: gci_server-windows-${{ github.sha }}
          path: release/

      # Lua-Dateien dazulegen
      - name: Prepare release package
        run: |
          mkdir -p release/lua
          cp lua/*.lua release/lua/
          cd release
          zip -r ../gci_poc-${{ github.ref_name }}-windows.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gci_poc-${{ github.ref_name }}-windows.zip
          body: |
            ## GCI POC ${{ github.ref_name }}

            ### Installation
            1. `gci_server.exe` starten
            2. `lua/Export.lua` nach `%USERPROFILE%\Saved Games\DCS\Scripts\` kopieren
            3. Gruppenname in `Export.lua` anpassen
            4. DCS starten

            ### Inhalt
            - `gci_server.exe` — UDP GCI Server (Port 9088)
            - `lua/Export.lua` — DCS Export Hook
            - `lua/gci_bridge.lua` — Mission Script (F10 Menü)
            - `lua/test_mission.lua` — Standalone Test
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
