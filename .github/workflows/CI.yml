name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  # Manueller Trigger: Actions-Tab → "Run workflow"
  # Dort kann man Version und ob ein GitHub Release erstellt wird angeben
  workflow_dispatch:
    inputs:
      version:
        description: "Release-Version (z.B. v0.2.0) — leer lassen für reinen Build"
        required: false
        default: ""
      create_release:
        description: "GitHub Release erstellen?"
        required: true
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────
  #  Tests auf Linux
  # ──────────────────────────────────────────────────────────────
  test-linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Dependencies
        run: sudo apt-get install -y cmake gcc

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SERVER=ON \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

  # ──────────────────────────────────────────────────────────────
  #  Windows Build
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test-linux

    steps:
      - uses: actions/checkout@v5

      - name: Configure (MSVC)
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SERVER=ON `
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run Tests on Windows
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload gci_server.exe
        uses: actions/upload-artifact@v6
        with:
          name: gci_server-windows-${{ github.sha }}
          path: |
            build/Release/gci_server.exe
            build/Export.lua
            build/gci_bridge.lua
            build/test_mission.lua
          retention-days: 30
          
  # ──────────────────────────────────────────────────────────────
  #  Windows DLL Build (Phase 2)
  # ──────────────────────────────────────────────────────────────
  build-windows-dll:
    name: Build Windows DLL
    runs-on: windows-latest
    needs: test-linux

    steps:
      - uses: actions/checkout@v5

      - name: Generate lua51.lib from DCS lua51.dll
        shell: pwsh
        run: |
          $msvcRoot = 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC'
          $version  = (Get-ChildItem $msvcRoot | Sort-Object Name -Descending | Select-Object -First 1).Name
          $binDir   = "$msvcRoot\$version\bin\Hostx64\x64"
          $dumpbin  = "$binDir\dumpbin.exe"
          $lib      = "$binDir\lib.exe"

          Write-Host "Using MSVC $version"

          $dll = "${{ github.workspace }}\third_party\lua51\lua51.dll"
          Set-Location "${{ github.workspace }}\third_party\lua51"

          $raw   = & $dumpbin /exports $dll
          $names = $raw | Where-Object { $_ -match '^\s+\d+\s+[0-9A-Fa-f]+\s+[0-9A-Fa-f]+\s+(\S+)' } |
                          ForEach-Object { $Matches[1] }
          if (-not $names) { throw 'No exports found in lua51.dll' }

          @('LIBRARY lua51', 'EXPORTS') + $names | Set-Content -Encoding ASCII lua51.def
          Write-Host "lua51.def written with $($names.Count) exports"

          & $lib /def:lua51.def /out:lua51.lib /machine:x64
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed" }
          Write-Host 'lua51.lib generated successfully'

      - name: Configure (MSVC)
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_SERVER=OFF `
            -DBUILD_TESTS=OFF `
            -DBUILD_DLL=ON `
            -DLUA51_LIB="${{ github.workspace }}/third_party/lua51/lua51.lib" `
            -DLUA51_INCLUDE="${{ github.workspace }}/third_party/lua51/include"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload gci_core.dll
        uses: actions/upload-artifact@v6
        with:
          name: gci_dll-windows-${{ github.sha }}
          path: build/Release/RedGCI.dll
          retention-days: 30
          
  # ──────────────────────────────────────────────────────────────
  #  Release
  #  Wird ausgeführt wenn:
  #    a) Tag wie v1.0.0 gepusht wird  (automatisch)
  #    b) workflow_dispatch mit create_release=true  (manuell)
  # ──────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [ test-linux, build-windows, build-windows-dll ]
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true)

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      # Version ermitteln: Tag-Name oder manuell eingegebene Version
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            # Fallback wenn leer: SHA-Kurzform
            if [ -z "$VERSION" ]; then
              VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
            fi
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Download Windows artifact      
        uses: actions/download-artifact@v7
        with:
          name: gci_server-windows-${{ github.sha }}
          path: release/

      - name: Download DLL artifact
        uses: actions/download-artifact@v7
        with:
          name: gci_dll-windows-${{ github.sha }}
          path: release/

      - name: Prepare release package
        run: |
          mkdir -p release/lua
          cp lua/*.lua release/lua/
          cd release
          zip -r ../gci_poc-${{ steps.version.outputs.version }}-windows.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GCI POC ${{ steps.version.outputs.version }}
          files: gci_poc-${{ steps.version.outputs.version }}-windows.zip
          body: |
            ## GCI POC ${{ steps.version.outputs.version }}

            ### Installation
            1. `gci_server.exe` starten
            2. `lua/Export.lua` nach `%USERPROFILE%\Saved Games\DCS\Scripts\` kopieren
            3. Gruppenname in `Export.lua` anpassen
            4. DCS starten

            ### Inhalt
            - `gci_server.exe` — UDP GCI Server (Port 9088)
            - `lua/Export.lua` — DCS Export Hook
            - `lua/gci_bridge.lua` — Mission Script (F10 Menü)
            - `lua/test_mission.lua` — Standalone Test
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') || contains(steps.version.outputs.version, 'dev') }}
